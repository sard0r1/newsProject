<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangiliklar</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:40px 20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .title{
            text-align:center;
            margin-bottom:30px;
            color:#222;
        }

        .news-card{
            background:white;
            padding:15px 20px;
            margin-bottom:15px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);
        }

        summary{
            cursor:pointer;
            font-size:18px;
            font-weight:bold;
            color:#1e3a8a;
            list-style:none;
        }

        summary::-webkit-details-marker{
            display:none;
        }

        summary::after{
            content:" ⬇";
            float:right;
            transition:0.3s;
        }

        details[open] summary::after{
            content:" ⬆";
        }

        .news-text{
            margin-top:10px;
            color:#555;
            line-height:1.6;
        }

        .empty{
            text-align:center;
            color:gray;
            margin-top:50px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1 class="title">📰 Kun yangiliklari</h1>

    {% for post in object_list %}
        <div class="news-card">
            <details>
                <summary>{{ post.title }}</summary>
                <p class="news-text">{{ post.text }}</p>
            </details>
        </div>
    {% empty %}
        <p class="empty">Hozircha yangiliklar yo‘q</p>
    {% endfor %}

</div>

</body>
</html>
