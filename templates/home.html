<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangiliklar</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:40px 20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .title{
            text-align:center;
            margin-bottom:30px;
            color:#222;
        }

        .news-card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .news-card:hover{
            transform:translateY(-3px);
            box-shadow:0 6px 15px rgba(0,0,0,0.15);
        }

        .news-title{
            color:#1e3a8a;
            margin-bottom:10px;
        }

        .news-text{
            color:#555;
            line-height:1.6;
        }

        .empty{
            text-align:center;
            color:gray;
            margin-top:50px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 class="title">📰 Kun Yangiliklari</h1>

    {% for post in object_list %}
        <div class="news-card">
            <h2 class="news-title">{{ post.title }}</h2>
            <p class="news-text">{{ post.text }}</p>
        </div>
    {% empty %}
        <p class="empty">Hozircha yangiliklar mavjud emas.</p>
    {% endfor %}

</div>

</body>
</html>
